# One-shot Job to stage Llama 3.1 405B Instruct AWQ-INT4 (~230 GB)
# from HuggingFace into the raj-ai-lab-eks-model-weights S3 bucket.
#
# Pattern mirrors ops/stage-llama-8b-job.yaml — see that file's
# header for the why-in-cluster rationale and tooling choices.
# Per-model deltas (these are bigger than the others):
#   - HF_REPO                hugging-quants/Meta-Llama-3.1-405B-Instruct-AWQ-INT4
#                            Public community AWQ quant — no Meta
#                            license acceptance needed (the
#                            hugging-quants community uploaded an
#                            already-quantized snapshot under their
#                            own non-gated namespace). Existing
#                            hf-token is fine but technically not
#                            required for this repo.
#   - S3_PREFIX              llama-3.1-405b-instruct-awq (matches
#                            the static-bind PV vllm-405b-s3mp's
#                            spec.mountOptions[prefix])
#   - ephemeral PVC          300 GiB (vs 30-50 GiB for the smaller
#                            models — 230 GB weights + ~30% slack
#                            for HF cache staging files)
#   - activeDeadlineSeconds  14400 (4h, vs 7200/2h for the others;
#                            HF download of 230 GB at ~125 MB/s
#                            sustained ≈ 30 min, plus ~12 min for
#                            S3 upload of 230 GB + slack)
#   - resources              same as smaller Jobs (1 CPU req, 4 GiB
#                            mem req, 4 CPU / 8 GiB limit). The work
#                            is I/O-bound (HF CDN download, S3
#                            multipart upload); kernel page cache
#                            uses free node memory opportunistically
#                            regardless of pod request.
#
# This is the ONLY model in the lab that uses S3 Mountpoint at
# serve-time (no per-model PVC). Once this Job lands, the
# vllm-llama-405b Deployment will read weights directly from this
# S3 prefix via the s3.csi.aws.com mount — no init-container
# aws-s3-sync step on cold-start. Be sure the mountpoint-s3-csi
# EKS add-on is installed first (mountpoint-s3-csi.tf in the
# infra repo) or the Deployment will fail at PV-binding time.
#
# Apply / monitor (this run will take ~45 min total):
#   kubectl apply -f ops/stage-llama-405b-job.yaml
#   kubectl -n default logs -l job-name=stage-llama-405b -f

apiVersion: batch/v1
kind: Job
metadata:
  name: stage-llama-405b
  namespace: default
  labels:
    op: stage-model-weights
    model: llama-3.1-405b-awq
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 14400
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        op: stage-model-weights
        model: llama-3.1-405b-awq
    spec:
      serviceAccountName: model-weights-stager
      nodeSelector:
        workload: general
      restartPolicy: OnFailure
      containers:
        - name: stager
          image: python:3.11-slim
          env:
            - name: HF_REPO
              value: hugging-quants/Meta-Llama-3.1-405B-Instruct-AWQ-INT4
            - name: S3_BUCKET
              value: raj-ai-lab-eks-model-weights
            - name: S3_PREFIX
              value: llama-3.1-405b-instruct-awq
            - name: AWS_REGION
              value: us-west-2
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              echo "=== [1/6] Installing hf + aws-cli v2 ==="
              apt-get update -qq
              apt-get install -qq -y --no-install-recommends curl ca-certificates tar unzip >/dev/null
              pip install --quiet --no-cache-dir "huggingface_hub[cli,hf_transfer]"
              curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscli.zip
              unzip -q /tmp/awscli.zip -d /tmp
              /tmp/aws/install

              echo "=== [2/6] Tool versions + AWS identity ==="
              hf --version
              aws --version
              aws sts get-caller-identity

              echo "=== [3/6] Verifying HF auth ==="
              if [ -z "${HF_TOKEN:-}" ]; then
                echo "INFO: HF_TOKEN empty — fine, hugging-quants mirror is public."
              else
                hf auth whoami
              fi

              echo "=== [4/6] Downloading $HF_REPO to /buffer/model (~230 GB, ~30 min) ==="
              # Excludes:
              #   *.bin            — prefer safetensors (some quants ship both)
              cd /buffer
              hf download "$HF_REPO" \
                --local-dir ./model \
                --exclude "*.bin"

              echo "=== [5/6] Local download manifest ==="
              ls -la ./model
              du -sh ./model

              echo "=== [6/6] Uploading to s3://$S3_BUCKET/$S3_PREFIX/ (~12 min for 230 GB) ==="
              # Tuning bumped vs smaller models — more concurrency +
              # larger chunks help saturate the VPC endpoint for the
              # ~10-shard, ~25 GB-per-shard upload.
              aws configure set default.s3.max_concurrent_requests 64
              aws configure set default.s3.multipart_chunksize 256MB
              aws s3 sync ./model/ "s3://$S3_BUCKET/$S3_PREFIX/" \
                --exclude '.cache/*' \
                --no-progress

              echo "=== S3 manifest ==="
              aws s3 ls "s3://$S3_BUCKET/$S3_PREFIX/" --recursive --summarize --human-readable

              echo "=== Done — staged $HF_REPO to s3://$S3_BUCKET/$S3_PREFIX/ ==="
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: buffer
              mountPath: /buffer
      volumes:
        - name: buffer
          ephemeral:
            volumeClaimTemplate:
              metadata:
                labels:
                  op: stage-model-weights
              spec:
                accessModes: [ReadWriteOnce]
                resources:
                  requests:
                    # 230 GB weights + HF cache staging + slack.
                    # Note: gp3 PVC at 300 GiB costs ~$0.03 for the
                    # ~45 min this Job lives — negligible.
                    storage: 300Gi
                storageClassName: gp3
